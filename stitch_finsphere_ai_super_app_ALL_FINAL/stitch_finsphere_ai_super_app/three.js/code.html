<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_41 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_41" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_41');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0x00c896, 2, 100);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// Emerald Data Spheres (Bubbles)
const sphereGroup = new THREE.Group();
const sphereGeometry = new THREE.SphereGeometry(0.5, 32, 32);
const sphereMaterial = new THREE.MeshPhongMaterial({
    color: 0x00c896,
    transparent: true,
    opacity: 0.3,
    shininess: 100,
    reflectivity: 1
});

for (let i = 0; i < 8; i++) {
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    sphere.position.set(
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 4,
        (Math.random() - 0.5) * 2
    );
    sphere.scale.setScalar(Math.random() * 0.5 + 0.2);
    sphere.userData.velocity = new THREE.Vector3(
        (Math.random() - 0.5) * 0.01,
        (Math.random() - 0.5) * 0.01,
        (Math.random() - 0.5) * 0.01
    );
    sphereGroup.add(sphere);
}
scene.add(sphereGroup);

// Futuristic 3D Credit Card
const cardGeometry = new THREE.BoxGeometry(3.5, 2.2, 0.05);
const cardMaterial = new THREE.MeshStandardMaterial({
    color: 0x161d1a,
    metalness: 0.8,
    roughness: 0.2,
    emissive: 0x00c896,
    emissiveIntensity: 0.1
});
const card = new THREE.Mesh(cardGeometry, cardMaterial);
scene.add(card);

camera.position.z = 5;

// Mouse Tracking
const mouse = new THREE.Vector2();
window.addEventListener('mousemove', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
});

function animate() {
    requestAnimationFrame(animate);
    
    // Animate Spheres
    sphereGroup.children.forEach(sphere => {
        sphere.position.add(sphere.userData.velocity);
        if (Math.abs(sphere.position.x) > 4) sphere.userData.velocity.x *= -1;
        if (Math.abs(sphere.position.y) > 3) sphere.userData.velocity.y *= -1;
        sphere.rotation.x += 0.01;
    });

    // Animate Card with Mouse
    card.rotation.y = THREE.MathUtils.lerp(card.rotation.y, mouse.x * 0.5, 0.1);
    card.rotation.x = THREE.MathUtils.lerp(card.rotation.x, -mouse.y * 0.4, 0.1);
    card.position.y = Math.sin(Date.now() * 0.001) * 0.1;

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_41 -->
</body>
</html>
