services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finsphere_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 4000
      JWT_SECRET: local-docker-secret
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/finsphere_ai?schema=public
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
